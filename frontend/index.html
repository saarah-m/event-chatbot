<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Planning Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="chat-container">
        <div id="chat-header">
            <h2>Event Planning Assistant</h2>
        </div>

        <!-- This is where messages appear -->
        <div id="chat-box"></div>

        <!-- This is where the user types -->
        <div id="input-area">
            <input id="user-input" type="text" placeholder="Ask me anything..."/>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="chat-widget.js"></script>
</body>
</html>
